name: Android CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Decode release keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 -d > keystore.jks
      - name: Build
        run: ./gradlew detekt ktlintCheck assembleRelease \
          -Pandroid.injected.signing.store.file=keystore.jks \
          -Pandroid.injected.signing.store.password="${{ secrets.SIGNING_STORE_PASSWORD }}" \
          -Pandroid.injected.signing.key.alias="${{ secrets.SIGNING_KEY_ALIAS }}" \
          -Pandroid.injected.signing.key.password="${{ secrets.SIGNING_KEY_PASSWORD }}"
      - uses: actions/upload-artifact@v4
        with:
          name: client-app-apk
          path: app/build/outputs/apk/release/app-release.apk
